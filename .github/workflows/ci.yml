name: CI (structure check)

on:
  push:
  pull_request:

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files/folders
        run: |
          test -f run_lab1.py
          test -f README.md
          test -d src
          test -d datacard
          test -f datacard/heuristics_scorecard.md
          test -f datacard/metadata_register.md
          test -f data_card.md
          echo "OK: repo structure looks good"
